<!DOCTYPE html>
<html lang="en">
<head>

    <title>Code Editor</title>

        <!-- Style / CSS Section -->

            <div class="section-header">
                <div class="icon">⟨/⟩</div>

                    <h2>Style</h2>
                    <p>Code · CSS</p>
                </div>
            </div>
            <!-- Placeholder for CSS content -->
        </div>

        <!-- Script / JS Section -->
